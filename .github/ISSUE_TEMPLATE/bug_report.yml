name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "e.g. Chrome 120 on macOS 14"
  - type: input
    id: provider
    attributes:
      label: S3 provider
      placeholder: "e.g. MinIO, AWS S3, DigitalOcean Spaces"
